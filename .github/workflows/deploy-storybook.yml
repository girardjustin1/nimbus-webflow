name: Deploy Storybook to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
    contents: read
    pages: write
    id-token: write

# One deploy at a time; newer pushes cancel in-progress runs.
concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            # Refresh the jsDelivr CDN cache for the blog embeds stylesheet so
            # Webflow (which links it via jsDelivr @main) picks up changes within
            # seconds of a merge. Non-fatal if the purge endpoint is unavailable.
            - name: Purge jsDelivr cache (blog-embeds.css)
              run: curl -sS "https://purge.jsdelivr.net/gh/girardjustin1/nimbus-webflow@main/src/webflow-embeds/blog-embeds.css" || true

            - name: Configure GitHub Pages
              uses: actions/configure-pages@v5
              with:
                  # Auto-enable Pages (source = GitHub Actions) if it isn't already.
                  enablement: true

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build Storybook
              run: npm run build-storybook

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: storybook-static

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
